name: Keep-Alive Ping

  on:
    schedule:
      - cron: '*/5 * * * *'
    workflow_dispatch:

  jobs:
    ping:
      runs-on: ubuntu-latest
      steps:
        - name: Ping Ovelin Mall
          run: |
            echo "Pinging https://ovelinmall-ovelin-mall.hf.space/api/healthz ..."
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://ovelinmall-ovelin-mall.hf.space/api/healthz)
            echo "Response: $STATUS"
            if [ "$STATUS" != "200" ]; then
              echo "Warning: Non-200 response ($STATUS) - space may be waking up"
            else
              echo "OK: Space is awake"
            fi
  