kind = "web"
previewPath = "/"
title = "Ovelin Mall"
version = "1.0.0"
id = "artifacts/ovelin"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20220

[services.development]
run = "pnpm --filter @workspace/ovelin run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ovelin", "run", "build" ]
serve = "static"
publicDir = "artifacts/ovelin/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20220"
BASE_PATH = "/"
