<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
    <title>Ovelin Store</title>

    <!-- PWA: إخفاء شريط المتصفح عند فتح التطبيق من الشاشة الرئيسية أو WebView -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Ovelin" />
    <meta name="application-name" content="Ovelin" />

    <!-- منع ظهور شريط العنوان في WebView -->
    <meta name="theme-color" content="#0f0f0f" />
    <meta name="msapplication-navbutton-color" content="#0f0f0f" />
    <meta name="msapplication-starturl" content="/" />

    <!-- ربط ملف manifest الذي يحدد وضع standalone (بدون شريط متصفح) -->
    <link rel="manifest" href="/manifest.json" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png" />

    <style>
      html,body,#root{
        min-height:100vh;
        background:
          radial-gradient(circle at top left, rgba(255,209,232,.95), transparent 55%),
          radial-gradient(circle at bottom right, rgba(255,155,209,.85), transparent 60%),
          linear-gradient(135deg, #fff8fc 0%, #ffeaf4 35%, #ffdbea 70%, #ffcde2 100%) !important;
      }
      body::before{
        content:'';position:fixed;top:-220px;left:-180px;
        width:700px;height:700px;border-radius:50%;
        background:rgba(255,0,120,.18);filter:blur(170px);
        z-index:-1;pointer-events:none;
      }
      body::after{
        content:'';position:fixed;bottom:-240px;right:-180px;
        width:700px;height:700px;border-radius:50%;
        background:rgba(255,120,200,.15);filter:blur(180px);
        z-index:-1;pointer-events:none;
      }
    </style>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
