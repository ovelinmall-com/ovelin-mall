openapi: 3.1.0
info:
  title: Api
  version: 0.2.0
  description: OVELIN store API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: catalog
  - name: orders
  - name: wallet
  - name: referrals
  - name: notifications
  - name: account
  - name: stats
  - name: ratings
  - name: wishlist
  - name: coupons
  - name: banners
  - name: settings
  - name: admin
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      responses:
        "200":
          description: Healthy
          content: { application/json: { schema: { $ref: "#/components/schemas/HealthStatus" } } }

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/RegisterBody" } } }
      responses:
        "200":
          description: User created
          content: { application/json: { schema: { $ref: "#/components/schemas/AuthResponse" } } }
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/LoginBody" } } }
      responses:
        "200":
          description: Logged in
          content: { application/json: { schema: { $ref: "#/components/schemas/AuthResponse" } } }
  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      responses:
        "200":
          description: Logged out
          content: { application/json: { schema: { $ref: "#/components/schemas/SuccessResponse" } } }
  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      responses:
        "200":
          description: Current user
          content: { application/json: { schema: { $ref: "#/components/schemas/User" } } }
  /auth/forgot-password:
    post:
      operationId: forgotPassword
      tags: [auth]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/ForgotPasswordBody" } } }
      responses:
        "200":
          description: Reset token
          content: { application/json: { schema: { $ref: "#/components/schemas/ForgotPasswordResponse" } } }
  /auth/reset-password:
    post:
      operationId: resetPassword
      tags: [auth]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/ResetPasswordBody" } } }
      responses:
        "200":
          description: Password reset
          content: { application/json: { schema: { $ref: "#/components/schemas/SuccessResponse" } } }

  /categories:
    get:
      operationId: listCategories
      tags: [catalog]
      responses:
        "200":
          description: Categories
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Category" } }
  /products:
    get:
      operationId: listProducts
      tags: [catalog]
      parameters:
        - { name: category, in: query, required: false, schema: { type: string } }
        - { name: platform, in: query, required: false, schema: { type: string } }
        - { name: search, in: query, required: false, schema: { type: string } }
        - { name: sort, in: query, required: false, schema: { type: string } }
      responses:
        "200":
          description: Products
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Product" } }
  /products/{id}:
    get:
      operationId: getProduct
      tags: [catalog]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Product
          content: { application/json: { schema: { $ref: "#/components/schemas/Product" } } }
  /products/{id}/ratings:
    get:
      operationId: listProductRatings
      tags: [ratings]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Ratings
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Rating" } }
    post:
      operationId: createProductRating
      tags: [ratings]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/CreateRatingBody" } } }
      responses:
        "200":
          description: Created
          content: { application/json: { schema: { $ref: "#/components/schemas/Rating" } } }

  /wishlist:
    get:
      operationId: getWishlist
      tags: [wishlist]
      responses:
        "200":
          description: Wishlist
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Product" } }
  /wishlist/{productId}:
    post:
